services:
  postgres:
    image: postgres:16-alpine
    container_name: kpop_collection_db
    env_file: .env.local
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - kpop_pgdata:/var/lib/postgresql/data

volumes:
  kpop_pgdata:
